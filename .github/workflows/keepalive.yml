name: Repository Keepalive

on:
  schedule:
    # GitHub Actions 不支持精确的“每 30 天”cron，按月执行一次即可避免 60 天无活动停用
    - cron: "0 0 1 * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  keepalive:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Update README month message
        run: |
          month=$(date -u +"%B")
          sed -i -E "s|^#### Nice to meet you,.*leave a ⭐$|#### Nice to meet you,have a good time in ${month} even better if you can leave a ⭐|" README.md

      - name: Commit keepalive change
        run: |
          git config user.name "chenxuan"
          git config user.email "1607772321@qq.com"
          git add README.md
          git commit -m "chore: keep repository active" || exit 0
          git push
